<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strategy Simulator</title>
    <style>
      body {
        margin: 0;
        background: #0b0e1a;
        color: #cdd6f4;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 14px;
      }
      #info {
        font-size: 13px;
        opacity: 0.75;
        text-align: center;
        line-height: 1.5;
        max-width: 420px;
      }
      #info b { color: #89b4fa; }

      /* 시작 메뉴 */
      #menu {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
        width: 340px;
        padding: 8px 0;
      }
      #menu h2 { text-align: center; margin: 4px 0; font-weight: 600; }
      .diff-btn {
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-align: left;
        padding: 12px 16px;
        border: 1px solid #2a2f4a;
        border-radius: 10px;
        background: #161a2e;
        color: #cdd6f4;
        cursor: pointer;
        font: inherit;
        transition: border-color 0.12s, background 0.12s;
      }
      .diff-btn:hover { border-color: #89b4fa; background: #1c2138; }
      .diff-btn b { font-size: 16px; color: #89b4fa; }
      .diff-btn span { font-size: 12px; opacity: 0.8; line-height: 1.5; }

      /* 게임오버 오버레이 */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: rgba(11, 14, 26, 0.82);
      }
      #overlay h2 { margin: 0; font-size: 24px; }
      #overlay .score { font-size: 18px; color: #89b4fa; }
      #overlay button {
        padding: 10px 24px;
        border: 1px solid #89b4fa;
        border-radius: 8px;
        background: #1c2138;
        color: #cdd6f4;
        cursor: pointer;
        font: inherit;
      }

      /* 리플레이 재생 배지 */
      #replay-badge {
        position: fixed;
        top: 10px;
        right: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        background: rgba(28, 33, 56, 0.9);
        border: 1px solid #89b4fa;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
      }
      #replay-badge span { color: #89b4fa; font-weight: 600; }
      #replay-badge button {
        padding: 3px 10px;
        border: 1px solid #2a2f4a;
        border-radius: 6px;
        background: #161a2e;
        color: #cdd6f4;
        cursor: pointer;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <b>클릭</b>=선택 / 가상이동 · <b>재클릭</b>=확정 · <b>우클릭</b>=취소<br />
      <b>F</b>=바닥 토글(그리드↔교차) · <b>Space</b>=모래시계 정지 · <b>M</b>=음악 · 우상단 점이 박자
    </div>
    <div id="menu"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
