<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Strategy Simulator</title>
    <style>
      body {
        margin: 0;
        background: #0b0e1a;
        color: #cdd6f4;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 14px;
        touch-action: manipulation; /* 더블탭 줌/지연 방지 */
        -webkit-user-select: none;
        user-select: none;
      }
      canvas { touch-action: none; }

      /* 모바일 컨텍스트 버튼(취소 / 콤보 종료) */
      #action-btn {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 600;
        border: 1px solid #89b4fa;
        border-radius: 10px;
        background: #1c2138ee;
        color: #cdd6f4;
        cursor: pointer;
        z-index: 50;
        display: none;
      }

      /* 특수기능 버튼 바 — 하단 가로 정렬 */
      #ability-bar {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 6px;
        z-index: 49;
      }
      .ability-btn {
        padding: 8px 6px;
        min-width: 72px;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.25;
        text-align: center;
        white-space: pre-line;
        border: 1px solid #6b5cff;
        border-radius: 9px;
        background: #1c2138ee;
        color: #cdd6f4;
        cursor: pointer;
      }
      /* 컨텍스트 버튼(취소 등)은 능력 바 위로 */
      #action-btn { bottom: 64px; }
      #info {
        font-size: 13px;
        opacity: 0.75;
        text-align: center;
        line-height: 1.5;
        max-width: 420px;
      }
      #info b { color: #89b4fa; }

      /* 시작 메뉴 */
      #menu {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: stretch;
        width: 340px;
        padding: 8px 0;
      }
      #menu h2 { text-align: center; margin: 4px 0; font-weight: 600; }
      .diff-btn {
        display: flex;
        flex-direction: column;
        gap: 4px;
        text-align: left;
        padding: 12px 16px;
        border: 1px solid #2a2f4a;
        border-radius: 10px;
        background: #161a2e;
        color: #cdd6f4;
        cursor: pointer;
        font: inherit;
        transition: border-color 0.12s, background 0.12s;
      }
      .diff-btn:hover { border-color: #89b4fa; background: #1c2138; }
      .diff-btn b { font-size: 16px; color: #89b4fa; }
      .diff-btn span { font-size: 12px; opacity: 0.8; line-height: 1.5; }

      /* 도움말 / 첫 플레이 안내 오버레이 */
      .info-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(11, 14, 26, 0.96);
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-y: auto;
        padding: 24px 16px 80px;
      }
      .info-card {
        max-width: 460px;
        width: 100%;
        line-height: 1.6;
        font-size: 14px;
      }
      .info-card h2 { text-align: center; color: #89b4fa; margin: 6px 0 16px; }
      .info-card h3 { color: #ffd24a; margin: 18px 0 6px; font-size: 15px; }
      .info-card p, .info-card li { margin: 4px 0; opacity: 0.9; }
      .info-card b { color: #89b4fa; }
      .info-card ul { padding-left: 20px; margin: 4px 0; }
      .info-close {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        padding: 14px 36px;
        font-size: 16px;
        font-weight: 600;
        border: 1px solid #89b4fa;
        border-radius: 10px;
        background: #1c2138;
        color: #cdd6f4;
        cursor: pointer;
        z-index: 101;
      }

      /* 게임오버 오버레이 */
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
        justify-content: center;
        background: rgba(11, 14, 26, 0.82);
      }
      #overlay h2 { margin: 0; font-size: 24px; }
      #overlay .score { font-size: 18px; color: #89b4fa; }
      #overlay button {
        padding: 10px 24px;
        border: 1px solid #89b4fa;
        border-radius: 8px;
        background: #1c2138;
        color: #cdd6f4;
        cursor: pointer;
        font: inherit;
      }

      /* 리플레이 재생 배지 */
      #replay-badge {
        position: fixed;
        top: 10px;
        right: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        background: rgba(28, 33, 56, 0.9);
        border: 1px solid #89b4fa;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
      }
      #replay-badge span { color: #89b4fa; font-weight: 600; }
      #replay-badge button {
        padding: 3px 10px;
        border: 1px solid #2a2f4a;
        border-radius: 6px;
        background: #161a2e;
        color: #cdd6f4;
        cursor: pointer;
        font: inherit;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <b>탭</b>=선택 / 가상이동 · <b>재탭</b>=확정 · 빈 곳 탭 또는 <b>취소</b> 버튼=취소<br />
      <b>F</b>=바닥 토글 · <b>Space</b>=모래시계 정지 · <b>M</b>=음악 · 우상단 점이 박자
    </div>
    <div id="menu"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
